training_backend: "torch"
device: "auto"
num_classes: 75
image_size: 224
batch_size: 64
capacity: 250
precision: "bf16"
learning_rate: 0.001
fine_tuning_learning_rate: 0.0001
weight_decay: 0.0001
label_smoothing: 0.1
initial_epochs: 10
fine_tuning_epochs: 90
# 面向 RTX 5090 的 PyTorch 训练默认档
rich_progress_refresh_per_second: 4
process_nice_increment: 0
seed: 42
min_learning_rate: 0.00005
torch_num_workers: 8
torch_pin_memory: true
torch_persistent_workers: true
torch_prefetch_factor: 4
torch_channels_last: true
torch_compile: false
torch_compile_mode: "default"
torch_matmul_precision: "high"

# --------------------------------------

static: "app/templates/static"
source_path: "data"

# --------------------------------------

model_path: "main/models"
log_dir: "main/models/log"
manifest_path: "main/models/model_manifest.json"
labels_path: "main/models/labels.json"

data: "TEMP/data"
upload_dir: "app/upload"
train_csv: "TEMP/data/Training_set.csv"
test_csv: "TEMP/data/Testing_set.csv"
train_data: "TEMP/data/train"
test_data: "TEMP/data/test"
